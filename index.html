<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 사주풀이 - 당신의 운명을 확인하세요</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <img src="images/main-logo.png" alt="사주 로고" class="main-image">
            <h1> AI가 분석하는 당신의 사주풀이</h1>
            <p>태어난 순간의 기운을 분석하여 당신의 길을 안내합니다.</p>
        </header>

        <section class="input-section">
            <form id="sajuForm" action="result.html" method="GET">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <input type="radio" id="male" name="gender" value="male" checked> <label for="male">남성</label>
                        <input type="radio" id="female" name="gender" value="female"> <label for="female">여성</label>
                    </div>
                </div>

				<div class="form-group">
					<label>생년월일</label>
					<div class="birthdate-group">
						<select id="year" name="year" required></select>
						<select id="month" name="month" required></select>
						<select id="day" name="day" required></select>
					</div>
					<input type="hidden" id="birthdate" name="birthdate">
				</div>
				
                <div class="form-group">
                    <label for="calendar">양력/음력</label>
                    <select id="calendar" name="calendar">
                        <option value="solar">양력</option>
                        <option value="lunar">음력 (평달)</option>
                        <option value="lunar_leap">음력 (윤달)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="birthtime">태어난 시간</label>
                    <select id="birthtime" name="birthtime">
                        <option value="unknown">모름</option>
                        <option value="00">子 (23:30 ~ 01:29)</option>
                        <option value="02">丑 (01:30 ~ 03:29)</option>
                        <option value="22">亥 (21:30 ~ 23:29)</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">운세 결과 확인하기</button>
            </form>
        </section>
    </div>

    <script>
        // 폼 제출 시 간단한 유효성 검사나 로컬 스토리지 저장을 수행할 수 있습니다.
        document.getElementById('sajuForm').addEventListener('submit', function(e) {
            // 필요 시 데이터 가공 로직 추가
        });
	// 페이지 로드 시 연/월/일 옵션 생성
		window.onload = () => {
			const yearSelect = document.getElementById('year');
			const monthSelect = document.getElementById('month');
			const daySelect = document.getElementById('day');

			// 연도 생성 (1920 ~ 현재)
			const currentYear = new Date().getFullYear();
			for (let i = currentYear; i >= 1920; i--) {
				yearSelect.add(new Option(i + "년", i));
			}

			// 월 생성
			for (let i = 1; i <= 12; i++) {
				monthSelect.add(new Option(i + "월", i.toString().padStart(2, '0')));
			}

			// 일 업데이트 함수 (윤년 계산 포함)
			function updateDays() {
				const year = parseInt(yearSelect.value);
				const month = parseInt(monthSelect.value);
				const lastDay = new Date(year, month, 0).getDate(); // 해당 월의 마지막 날 계산

				// 기존 일 옵션 초기화
				const currentSelectedDay = daySelect.value;
				daySelect.innerHTML = "";

				for (let i = 1; i <= lastDay; i++) {
					const dayValue = i.toString().padStart(2, '0');
					daySelect.add(new Option(i + "일", dayValue));
				}

				// 이전에 선택했던 날짜가 유효하면 유지
				if (currentSelectedDay <= lastDay) {
					daySelect.value = currentSelectedDay;
				}
			}

			// 연도나 월이 바뀌면 일(day) 리스트를 갱신
			yearSelect.addEventListener('change', updateDays);
			monthSelect.addEventListener('change', updateDays);

			// 초기 실행
			updateDays();
			daySelect.value = "01"
		};

		// 폼 제출 시 hidden input에 YYYY-MM-DD 형식으로 결합
		document.querySelector('form').onsubmit = function() {
			const y = document.getElementById('year').value;
			const m = document.getElementById('month').value;
			const d = document.getElementById('day').value;
			document.getElementById('birthdate').value = `${y}-${m}-${d}`;
		};
    </script>
</body>
</html>
