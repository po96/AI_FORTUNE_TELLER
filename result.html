<!DOCTYPE html>
<html lang="ko">
<div id="loading" class="loading-box">
    <div class="spinner"></div>
    <p id="loading-text">밤하늘의 기운을 모으는 중입니다...</p>
</div>

<script>
    // 로딩 메시지 리스트 (기존과 동일)
    const loadingMessages = [
        "밤하늘의 기운을 모으는 중입니다...",
        "생년월일시의 간지를 계산하고 있습니다...",
        "야자시 적용 여부를 정밀하게 확인 중입니다...",
        "귀하의 핵심 기둥인 '일주'를 분석하고 있습니다...",
        "명리학적 데이터를 바탕으로 리포트를 생성하고 있습니다..."
    ];

    window.onload = async () => {
        // [수정 포인트] 주소창(URL)에서 파라미터 추출
        const urlParams = new URLSearchParams(window.location.search);
        const userData = {
            name: urlParams.get('name'),
            gender: urlParams.get('gender'),
            birthdate: urlParams.get('birthdate'),
            calendar: urlParams.get('calendar'),
            birthtime: urlParams.get('birthtime')
        };

        // 데이터가 하나라도 없으면 메인으로 리다이렉트
        if (!userData.name || !userData.birthdate) {
            alert("입력 데이터가 없습니다. 메인으로 이동합니다.");
            location.href = 'index.html';
            return;
        }

        // --- 메시지 애니메이션 (기존과 동일) ---
        let msgIndex = 0;
        const msgElement = document.getElementById('loading-text');
        const msgInterval = setInterval(() => {
            msgIndex = (msgIndex + 1) % loadingMessages.length;
            msgElement.innerText = loadingMessages[msgIndex];
        }, 2000);

		try {
			// 1. 절대 경로로 호출 (origin 추가)
			const apiUrl = window.location.origin + '/api/analyze';
			console.log("요청 주소:", apiUrl); // 디버깅용

			const response = await fetch(apiUrl, {
				method: 'POST',
				headers: { 
					'Content-Type': 'application/json',
					'Accept': 'application/json' 
				},
				body: JSON.stringify(userData)
			});

			// 2. 응답 상태값 확인
			if (!response.ok) {
				// 서버에서 보낸 에러 메시지 본문 읽기
				const errorData = await response.json();
				throw new Error(errorData.error || `HTTP 에러! 상태코드: ${response.status}`);
			}

			const data = await response.json();

			// 결과 표시
			clearInterval(msgInterval);
			document.getElementById('loading').style.display = 'none';
			document.getElementById('content').style.display = 'block';
			document.getElementById('analysis-result').innerText = data.result;

		} catch (error) {
			console.error("상세 에러 내역:", error); // 브라우저 F12 콘솔에 출력됨
			clearInterval(msgInterval);
			// 화면에도 구체적인 에러 이유를 표시
			msgElement.innerHTML = `<span style="color:red;">오류 발생: ${error.message}</span>`;
};
</script>
