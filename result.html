<div class="result-container">
    <h2>✨ 당신의 운명 분석 리포트</h2>
    
    <div id="loading" class="loading-box">
        <p>밤하늘의 별자리를 분석 중입니다...</p>
        <div class="spinner"></div>
    </div>

    <div id="content" style="display: none;">
        <div id="analysis-result" class="analysis-text">
            </div>
        <button onclick="location.href='index.html'" class="retry-btn">다시 하기</button>
    </div>
</div>

<script type="module">
    import { fetchSajuAnalysis } from './api/analyze.js';

    window.onload = async () => {
        // 1. 이전 페이지에서 저장한 데이터 가져오기
        const userData = JSON.parse(localStorage.getItem('sajuData'));
        
        if (!userData) {
            alert("입력된 정보가 없습니다.");
            location.href = 'index.html';
            return;
        }

        // 2. API 호출
        const analysis = await fetchSajuAnalysis(userData);

        // 3. 화면 업데이트
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        
        // 줄바꿈 보존을 위해 innerHTML 대신 구분을 지어 넣거나 스타일 적용
        document.getElementById('analysis-result').innerText = analysis;
    };
</script>
