<!DOCTYPE html>
<html lang="ko">
<div id="loading" class="loading-box">
    <div class="spinner"></div>
    <p id="loading-text">밤하늘의 기운을 모으는 중입니다...</p>
</div>

<script>
    // 로딩 메시지 리스트 (기존과 동일)
    const loadingMessages = [
        "밤하늘의 기운을 모으는 중입니다...",
        "생년월일시의 간지를 계산하고 있습니다...",
        "야자시 적용 여부를 정밀하게 확인 중입니다...",
        "귀하의 핵심 기둥인 '일주'를 분석하고 있습니다...",
        "명리학적 데이터를 바탕으로 리포트를 생성하고 있습니다..."
    ];

    window.onload = async () => {
        // [수정 포인트] 주소창(URL)에서 파라미터 추출
        const urlParams = new URLSearchParams(window.location.search);
        const userData = {
            name: urlParams.get('name'),
            gender: urlParams.get('gender'),
            birthdate: urlParams.get('birthdate'),
            calendar: urlParams.get('calendar'),
            birthtime: urlParams.get('birthtime')
        };

        // 데이터가 하나라도 없으면 메인으로 리다이렉트
        if (!userData.name || !userData.birthdate) {
            alert("입력 데이터가 없습니다. 메인으로 이동합니다.");
            location.href = 'index.html';
            return;
        }

        // --- 메시지 애니메이션 (기존과 동일) ---
        let msgIndex = 0;
        const msgElement = document.getElementById('loading-text');
        const msgInterval = setInterval(() => {
            msgIndex = (msgIndex + 1) % loadingMessages.length;
            msgElement.innerText = loadingMessages[msgIndex];
        }, 2000);

        try {
			const response = await fetch('/api/analyze', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(userData)
			});

			const data = await response.json();

			if (data.result) {
				// 로딩창 숨기기
				clearInterval(msgInterval);
				document.getElementById('loading').style.display = 'none';
				
				// 결과창 보이기
				const contentArea = document.getElementById('content');
				const resultArea = document.getElementById('analysis-result');
				
				contentArea.style.display = 'block';
				
				// [중요] 텍스트가 줄바꿈을 유지하며 나타나도록 설정
				resultArea.innerText = data.result; 
				// 만약 HTML 태그로 해석하고 싶다면 라이브러리(marked.js 등)를 써야 하지만, 
				// 우선은 innerText와 CSS의 white-space: pre-wrap 조합이 가장 안전합니다.
			}
		} catch (error) {
            console.error(error);
            clearInterval(msgInterval);
            msgElement.innerText = "분석 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.";
        }
    };
</script>
