<div class="result-container">
    <h2>✨ 당신의 운명 분석 리포트</h2>
    
    <div id="loading" class="loading-box">
        <p>밤하늘의 별자리를 분석 중입니다...</p>
        <div class="spinner"></div>
    </div>

    <div id="content" style="display: none;">
        <div id="analysis-result" class="analysis-text">
            </div>
        <button onclick="location.href='index.html'" class="retry-btn">다시 하기</button>
    </div>
</div>

<script type="module">
    import { fetchSajuAnalysis } from './api/analyze.js';

    window.onload = async () => {
        // 1. 이전 페이지에서 저장한 데이터 가져오기
const userData = JSON.parse(localStorage.getItem('sajuData'));

const response = await fetch('/api/analyze', { // Vercel은 /api/파일명이 곧 주소입니다.
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(userData)
});

const data = await response.json();
document.getElementById('analysis-result').innerText = data.result;
    };
</script>
